spring:
  application:
    name: engram-support-bot

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

# Engram memory layer — auto-configured by engram-spring-boot-starter
engram:
  base-url: http://localhost:9090
  default-org-id: support-bot
  health:
    enabled: true
  spring-ai:
    auto-wire: true

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    dev.jamjet.engram: INFO
    org.springframework.ai: WARN
